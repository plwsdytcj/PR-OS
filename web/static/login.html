<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>登录 Kolness - PR AI OS</title>
    <meta
      name="description"
      content="Login to Kolness PR AI OS as an internal PR team member or client reviewer."
    />
    <link rel="icon" href="/static/favicon.svg?v=20260611-1" type="image/svg+xml" />
    <link rel="stylesheet" href="/static/login.css?v=20260611-2" />
    <script src="/static/login.js?v=20260611-2" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#loginForm">跳到登录表单</a>
    <main class="login-shell">
      <section class="brand-panel" aria-labelledby="loginHeroTitle">
        <a class="brand-lockup" href="/" aria-label="Kolness home">
          <span class="brand-mark">KO</span>
          <span>
            <strong>Kolness</strong>
            <em>KOL + AI + OS</em>
          </span>
        </a>

        <div class="hero-copy">
          <p class="eyebrow">Kolness Access</p>
          <h1 id="loginHeroTitle">一个入口，自动进入你的 PR 工作空间。</h1>
          <p>
            内部团队进入完整 PR OS，甲方客户进入项目 Portal。你只需要登录，系统会根据账号权限自动分流。
          </p>
        </div>
      </section>

      <section class="login-panel" aria-labelledby="loginTitle">
        <div class="panel-tag" id="loginModePill">Identity required</div>
        <h2 id="loginTitle">登录 Kolness</h2>
        <p id="loginHelp">同一个入口支持内部成员和甲方账号，登录后自动进入对应视图。</p>

        <form id="loginForm" class="auth-form">
          <label>
            <span>邮箱</span>
            <input id="email" name="email" type="email" autocomplete="email" required />
          </label>
          <label>
            <span>密码</span>
            <input id="password" name="password" type="password" autocomplete="current-password" required />
          </label>
          <button class="primary-action" type="submit">登录</button>
        </form>

        <div id="loginFeedback" class="feedback" role="status" aria-live="polite"></div>

        <details class="bootstrap-box">
          <summary>首次部署创建 admin</summary>
          <form id="bootstrapForm" class="auth-form compact">
            <label>
              <span>Admin 邮箱</span>
              <input id="adminEmail" name="adminEmail" type="email" autocomplete="email" />
            </label>
            <label>
              <span>Admin 密码</span>
              <input id="adminPassword" name="adminPassword" type="password" autocomplete="new-password" />
            </label>
            <button class="secondary-action" type="submit">创建并进入</button>
          </form>
        </details>

        <div class="login-hint-grid" aria-label="登录后视图">
          <span>Internal OS</span>
          <span>Client Portal</span>
        </div>

        <a class="back-link" href="/">返回首页</a>
      </section>
    </main>
  </body>
</html>
