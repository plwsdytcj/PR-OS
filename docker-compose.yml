services:
  app:
    build: .
    ports:
      - "8601:8601"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://pr_ai_os:pr_ai_os@postgres:5432/pr_ai_os
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: pr_ai_os
      POSTGRES_USER: pr_ai_os
      POSTGRES_PASSWORD: pr_ai_os
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/postgres_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pr_ai_os -d pr_ai_os"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
